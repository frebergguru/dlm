name: release

# Build the AppImage (Linux) and both Windows installers (x64 + x86) and attach
# them to a GitHub Release whenever a version tag (v*) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # manual run to validate the build jobs without tagging

permissions:
  contents: write          # needed to create the release

# Actions are pinned to majors that run on Node 24 (checkout@v7,
# upload-artifact@v7, download-artifact@v8); the release is published with the
# gh CLI (a plain run step, no JS action) so nothing can be deprecated.

jobs:
  appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libcurl4-openssl-dev libjansson-dev libsqlite3-dev \
            libpcre2-dev libssl-dev libgtk-4-dev libadwaita-1-dev \
            wget ca-certificates file patchelf desktop-file-utils \
            librsvg2-bin libglib2.0-bin libgdk-pixbuf2.0-bin
      - name: Build AppImage
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          ./installer/appimage/build-appimage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: dist/*.AppImage
          if-no-files-found: error

  windows:
    name: Windows installers (x64 + x86)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Build Windows installers (Docker)
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          ./build-win.sh
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [appimage, windows]
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'      # only publish for an actual version tag
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create / update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          files=(artifacts/appimage/*.AppImage artifacts/windows/*.exe)
          ls -lh "${files[@]}"
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes "${files[@]}" \
            || gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --clobber "${files[@]}"
